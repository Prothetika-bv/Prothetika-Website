<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prothetika — Binnenkort online</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root { --black: #0A0A0A; --near-black: #111111; --dark: #1C1C1C; --muted: #6B6B6B; --light: #AFAFAF; --white: #FFFFFF; }
html, body { height: 100%; }
body {
  font-family: 'Inter', sans-serif;
  background: var(--black);
  color: var(--white);
  -webkit-font-smoothing: antialiased;
  display: flex;
  flex-direction: column;
  min-height: 100vh;
}

/* Grid overlay achtergrond */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
  background-size: 60px 60px;
  pointer-events: none;
  z-index: 0;
}

.container {
  position: relative;
  z-index: 1;
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 48px 24px;
  text-align: center;
}

.logo-wrap {
  margin-bottom: 64px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 20px;
}

.logo {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 28px;
  font-weight: 700;
  letter-spacing: -0.04em;
  color: var(--white);
}

.logo span { color: var(--muted); font-weight: 300; }

.logo-divider {
  width: 1px;
  height: 32px;
  background: rgba(255,255,255,0.12);
}

.laverman-logo {
  width: 160px;
  height: auto;
  opacity: 0.85;
}

.eyebrow {
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 24px;
  display: flex;
  align-items: center;
  gap: 12px;
}

.eyebrow::before, .eyebrow::after {
  content: '';
  display: block;
  width: 32px;
  height: 1px;
  background: var(--muted);
}

h1 {
  font-family: 'Space Grotesk', sans-serif;
  font-size: clamp(40px, 7vw, 80px);
  font-weight: 700;
  line-height: 1.0;
  letter-spacing: -0.04em;
  margin-bottom: 28px;
}

h1 em {
  font-style: normal;
  color: var(--muted);
  font-weight: 300;
}

.tagline {
  font-size: clamp(15px, 2vw, 18px);
  line-height: 1.7;
  color: var(--light);
  font-weight: 300;
  max-width: 480px;
  margin: 0 auto 56px;
}

.contact-block {
  border: 1px solid rgba(255,255,255,0.1);
  padding: 32px 48px;
  display: inline-flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
  margin-bottom: 48px;
}

.contact-label {
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--muted);
}

.contact-email {
  font-family: 'Space Grotesk', sans-serif;
  font-size: clamp(16px, 2.5vw, 22px);
  font-weight: 600;
  letter-spacing: -0.01em;
  color: var(--white);
  text-decoration: none;
  transition: color 0.2s;
}

.contact-email:hover { color: var(--light); }

footer {
  position: relative;
  z-index: 1;
  border-top: 1px solid rgba(255,255,255,0.07);
  padding: 24px 48px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 12px;
  color: var(--muted);
}

@media (max-width: 600px) {
  footer { flex-direction: column; gap: 8px; text-align: center; padding: 20px 24px; }
  .contact-block { padding: 24px 32px; }
}

/* Fade in animatie */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(24px); }
  to { opacity: 1; transform: none; }
}
.logo-wrap { animation: fadeUp 0.7s ease both; }
.eyebrow { animation: fadeUp 0.7s ease 0.1s both; }
h1 { animation: fadeUp 0.7s ease 0.2s both; }
.tagline { animation: fadeUp 0.7s ease 0.3s both; }
.contact-block { animation: fadeUp 0.7s ease 0.4s both; }
</style>
</head>
